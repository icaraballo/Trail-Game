<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Trail · v33</title>
<style>
:root{--color-background-primary:#fff;--color-background-secondary:#f8f7f3;--color-background-tertiary:#f0ede8;--color-text-primary:#1a1a1a;--color-text-secondary:#888;--color-text-tertiary:#aaa;--color-border-tertiary:#e0dfd8;--border-radius-md:8px;--border-radius-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem 5rem}
#app{width:100%;max-width:560px}
#tab-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#fff;border-top:1px solid #e8e6e0;display:none;z-index:200}
.tab-nav-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.tab-btn{padding:10px 4px 12px;text-align:center;cursor:pointer;border:none;background:none;transition:background .15s;border-top:2px solid transparent;width:100%}
.tab-btn:hover{background:#f8f7f3}
.tab-btn.active{border-top-color:#1a1a1a}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}
.tab-label{font-size:12px;font-weight:600;color:#888;letter-spacing:.3px;text-transform:uppercase}
.tab-btn.active .tab-label{color:#1a1a1a}
.quarter-wrap{border:1.5px solid #1a1a1a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.quarter-toggle{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#fff;transition:background .15s}
.quarter-toggle:hover{background:var(--color-background-secondary)}
.quarter-toggle.has-sel{background:#f2faf0}
.quarter-content{display:none;padding:10px 10px 6px;border-top:1px solid #e8e6e0;background:#fafaf8}
.quarter-content.open{display:block}
.cal-race{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:6px}
.cal-race.sel{background:#f2faf0;border:1px solid #b8ddb8}
.cal-race.avail{background:#f8f7f3;border:1px solid #e8e6e0}
.cal-race.lock{background:#fafafa;border:1px solid #eee;opacity:0.5}
.cal-race-name{font-size:13px;font-weight:500}
.cal-race-meta{font-size:12px;color:#aaa;margin-top:1px}
.cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:8px}
.fin-section{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.fin-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.fin-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid #f5f4f0}
.fin-row:last-child{border-bottom:none}
.fin-row.tot{font-weight:700;border-top:1px solid #e0dfd8;margin-top:4px;padding-top:10px;font-size:15px}
.plus{color:#2d7a2d}
.minus{color:#c0392b}
h1{font-size:26px;font-weight:700;margin-bottom:2px}
h2{font-size:20px;font-weight:700;margin-bottom:2px}
p.sub{color:#777;font-size:14px;margin-bottom:18px}
.field-label{font-size:13px;color:#888;display:block;margin-bottom:6px}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:18px;outline:none;background:#fff}
input[type=text]:focus{border-color:#999}
button.main{width:100%;padding:12px;border:1px solid #bbb;border-radius:8px;background:#fff;font-size:15px;cursor:pointer;font-weight:500;transition:background .15s;margin-top:6px}
button.main:hover:not([disabled]){background:#ece9e3}
button.main[disabled]{opacity:0.35;cursor:default}
button.secondary{padding:8px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;transition:background .15s}
button.secondary:hover{background:#f0ede8}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spec{border:1px solid #ddd;border-radius:8px;padding:11px 13px;cursor:pointer;transition:background .15s}
.spec:hover{background:#f5f4f0}
.spec.sel{border-color:#999;background:#f0ede8}
.spec-label{font-size:14px;font-weight:600;margin-bottom:2px}
.spec-desc{font-size:12px;color:#888}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;color:#666;width:96px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#e5e4de;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-pct{font-size:12px;font-weight:500;min-width:30px;text-align:right}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#f5f4f0;border-radius:8px;padding:10px;text-align:center}
.stat-label{font-size:12px;color:#999;margin-bottom:3px;line-height:1.3}
.stat-val{font-size:14px;font-weight:700}
.race-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.race-card:hover{background:#f8f7f3}
.race-card.sel{border-color:#4a8a2a;background:#f2faf0}
.race-card.locked{opacity:0.4;cursor:default}
.sponsor-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.sponsor-card:hover{background:#f8f7f3}
.sponsor-card.active{border-color:#4a90d9;background:#f0f6ff}
.train-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;cursor:pointer;transition:background .15s;margin-bottom:8px}
.train-card:hover{background:#f8f7f3}
.train-card.sel{border-color:#4a90d9;background:#f0f6ff}
.work-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.work-card:hover:not(.locked-work){background:#f8f7f3}
.work-card.sel{border-color:#1a1a1a;background:#f5f4f0}
.work-card.locked-work{opacity:0.35;cursor:default}
.seg-card{border:1px solid #ddd;border-radius:12px;padding:13px 16px;margin-bottom:10px}
.pace-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pace{border:1px solid #ddd;border-radius:8px;padding:12px;cursor:pointer;transition:background .15s;background:#fff}
.pace:hover{background:#f5f4f0}
.pace-label{font-size:13px;font-weight:600;margin-bottom:2px}
.pace-desc{font-size:12px;color:#888;margin-bottom:6px}
.pace-meta{display:flex;justify-content:space-between;font-size:12px;color:#aaa}
.aid-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:background .15s;background:#fff}
.aid-row:hover:not(.disabled){background:#f5f4f0}
.aid-row.disabled{opacity:0.4;cursor:default}
.aid-row.sel-aid{border-color:#4a8a2a;background:#f2faf0}
.finish-time{background:#f5f4f0;border-radius:12px;padding:18px;text-align:center;margin-bottom:16px}
.finish-time .label{font-size:12px;color:#888;margin-bottom:4px}
.finish-time .val{font-size:32px;font-weight:700}
.prog-wrap{margin-bottom:12px}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:4px}
.prog-track{height:3px;background:#e5e4de;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#4a90d9;border-radius:2px;transition:width .4s}
.event-box{font-size:13px;color:#666;font-style:italic;background:#f5f4f0;padding:9px 12px;border-radius:8px;margin-bottom:10px}
.warn{background:#fef9ec;border:1px solid #f0d98a;border-radius:8px;padding:10px 13px;font-size:13px;color:#7a5a10;margin-bottom:12px}
.notif-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#4a8a2a;flex-shrink:0;box-shadow:0 0 0 2px #fff}
.notif-dot.urgent{background:#c0392b}
.coach-slot-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
.coach-slot-card:hover{background:#f8f7f3;border-color:#bbb}
.coach-slot-card.active-slot{border-color:#4a90d9;background:#f0f6ff}
.coach-slot-card.empty-slot{border:1.5px dashed #ccc;background:#fafaf8;opacity:0.7}
.coach-slot-card.locked-slot{border:1.5px dashed #e0dfd8;background:#fafaf8;opacity:0.45;cursor:default}
.slot-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.slot-tab{padding:6px 12px;border-radius:20px;border:1.5px solid #e0dfd8;background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.slot-tab:hover{background:#f5f4f0}
.slot-tab.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.delegated-badge{display:inline-block;background:#f0f6ff;color:#4a90d9;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;border:1px solid #b8d4f0}
.club-runner-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.club-runner-card:hover{background:#f8f7f3}
.club-runner-card.sel{border-color:#4a8a2a;background:#f2faf0}
.club-runner-card.assigned{border-color:#4a90d9;background:#f0f6ff}
.club-stat-pill{display:inline-block;background:#f0ede8;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600;color:#555;margin-right:4px}
.club-level-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.club-race-row{background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:10px 14px;margin-bottom:6px}
.socios-bar{height:6px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:4px}
.socios-fill{height:100%;border-radius:3px;transition:width .4s}
.note{background:#eaf4ea;border:1px solid #b8ddb8;border-radius:8px;padding:10px 13px;font-size:13px;color:#2d5a2d;margin-bottom:12px}
.danger{background:#fef0f0;border:1px solid #f5b8b8;border-radius:8px;padding:10px 13px;font-size:13px;color:#7a1010;margin-bottom:12px}
.hint{background:#f5f4f0;border:1px solid #e8e6e0;border-radius:8px;padding:9px 13px;font-size:13px;color:#666;margin-bottom:12px;font-style:italic}
.load-bar-wrap{margin-bottom:14px}
.load-bar-track{height:5px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:4px}
.month-badge{display:inline-block;font-size:12px;font-weight:600;padding:2px 7px;border-radius:4px;margin-right:4px}
/* Terrain & injury badges */
.terrain-badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin-right:4px}
.injury-card{background:#fff;border:1.5px solid #f5b8b8;border-radius:10px;padding:13px 16px;margin-bottom:10px}
.injury-type{font-size:15px;font-weight:700;color:#7a1010;margin-bottom:4px}
.abandon-btn{width:100%;padding:11px;border:1.5px solid #c0392b;border-radius:8px;background:#fef0f0;color:#c0392b;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.abandon-btn:hover{background:#fdd}
/* Mode select screen */
.carrera-group{border:1.5px solid #1a1a1a;border-radius:12px;margin-bottom:8px;overflow:hidden}
.carrera-group-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;background:var(--color-background-primary);transition:background .15s}
.carrera-group-header:hover{background:var(--color-background-secondary)}
.carrera-group-content{border-top:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);padding:8px;display:none}
.carrera-group-content.open{display:block}
.diff-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.diff-card:hover{background:var(--color-background-secondary)}
.diff-card.sel-diff{border:1.5px solid currentColor}
.diff-card:last-child{margin-bottom:0}
.mode-big{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s}
.mode-big:hover{background:var(--color-background-secondary)}
/* Save slots */
.save-slot{background:#fff;border:0.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.save-slot.empty{border-style:dashed;background:#fafaf8}
.save-slot-info{flex:1}
.save-slot-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.save-slot-meta{font-size:12px;color:#888}
.save-btns{display:flex;gap:6px;flex-shrink:0;margin-top:8px}
.save-btn{padding:5px 10px;border-radius:6px;border:0.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:background .15s}
.save-btn:hover{background:#f0ede8}
.save-btn.danger{border-color:#f5b8b8;color:#c0392b}
.save-btn.danger:hover{background:#fef0f0}
.save-btn.primary{border-color:#4a90d9;color:#4a90d9}
.save-btn.primary:hover{background:#f0f6ff}
.import-area{width:100%;min-height:80px;padding:10px;border:0.5px solid #ddd;border-radius:8px;font-size:12px;font-family:monospace;resize:vertical;background:#fafaf8}
.import-area:focus{outline:none;border-color:#999}
/* Dropbag */
.dropbag-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff;transition:background .15s}
.dropbag-item:hover{background:var(--color-background-secondary)}
.dropbag-item.sel-bag{border-color:#4a8a2a;background:#f2faf0}
/* ── SPEC RACES DROPDOWN ── */
.spec-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;background:var(--color-background-secondary);margin-bottom:6px;font-size:13px;font-weight:600;border:0.5px solid var(--color-border-tertiary)}
.spec-toggle:hover{background:var(--color-background-tertiary)}
.spec-arrow{font-size:12px;transition:transform .2s;flex-shrink:0}
.spec-arrow.open{transform:rotate(90deg)}
.spec-races{display:none;padding-left:8px}
.spec-races.open{display:block}
/* ── CIRCUIT CARD ── */
.circuit-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.circuit-card:hover{background:#f8f7f3}
.circuit-card.joined{border-color:#c07a10;background:#fef9ec}
.circuit-pts{font-size:22px;font-weight:700;color:#c07a10}
/* ── FAME TAB ── */
.fame-action{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.fame-action:hover:not(.fame-disabled){background:#f8f7f3}
.fame-action.fame-disabled{opacity:0.4;cursor:default}
.fame-stat{background:#f5f4f0;border-radius:8px;padding:10px;text-align:center}
.followers-bar{height:6px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:6px}
.followers-fill{height:100%;background:#c07a10;border-radius:3px;transition:width .4s}
.divider{border:none;border-top:1px solid #e8e6e0;margin:16px 0}
.section-label{font-size:13px;color:#888;margin-bottom:8px}
.profile{display:flex;gap:3px;align-items:flex-end;height:40px;margin-bottom:6px}
/* ── CLASIFICACIÓN EN VIVO ── */
.live-class{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.live-class-title{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.live-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.live-row.me{font-weight:700;background:#f5f4f0;border-radius:6px;padding:5px 6px;margin:2px -6px}
.live-pos{width:22px;text-align:center;font-size:12px;flex-shrink:0}
.live-name{flex:1}
.live-gap{font-size:12px;color:#aaa;flex-shrink:0}
/* ── FICHA CORREDOR ── */
.runner-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.runner-avatar{width:52px;height:52px;border-radius:50%;background:#f0ede8;border:2px solid #e0dfd8;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rank-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:6px;margin-top:4px}
.rank-global{background:#f0ede8;color:#666}
.rank-spec{background:#e8eef8;color:#2d4fa0}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0ede8;font-size:14px}
.history-row:last-child{border-bottom:none}
.contract-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.contract-row:last-child{border-bottom:none}

/* ── BARRA FINANCIERA PERSISTENTE ── */
#fin-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8e6e0;padding:8px 0 10px;margin-bottom:16px;display:none}
.fin-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:0}
.fin-cell{text-align:center;padding:0 4px}
.fin-cell:not(:last-child){border-right:1px solid #eee}
.fin-top{font-size:12px;color:#aaa;margin-bottom:2px}
.fin-val{font-size:14px;font-weight:700}
.fin-val.green{color:#2d7a2d}
.fin-val.red{color:#c0392b}
.fin-val.neutral{color:#1a1a1a}

/* ── TABLA ECONOMÍA ── */
.eco-table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:14px}
.eco-table td{padding:8px 4px;border-bottom:1px solid #f0ede8}
.eco-table tr:last-child td{border-bottom:none;font-weight:700}
.eco-table .right{text-align:right}
.eco-table .plus{color:#2d7a2d}
.eco-table .minus{color:#c0392b}
.eco-table .total{font-size:15px}
/* ── TRANSICIÓN PANTALLAS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 150ms ease-out both}
/* ── TOAST FEEDBACK ── */
#toast-notif{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;white-space:nowrap;transition:opacity .35s;opacity:0}
#toast-notif.show{opacity:1}
/* ── TIP INLINE BUTTON ── */
.tip-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid #d0cec8;background:#fafaf8;color:#aaa;font-size:10px;cursor:pointer;vertical-align:middle;margin-left:5px;padding:0;line-height:1;flex-shrink:0;font-style:normal;transition:background .15s}
.tip-btn:hover{background:#f0ede8;color:#666;border-color:#bbb}
/* ── TIP OVERLAY (bottom sheet) ── */
#tip-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1200;align-items:flex-end;justify-content:center;padding-bottom:0}
.tip-modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%;max-width:560px;box-shadow:0 -4px 24px rgba(0,0,0,.12);animation:slideUp 200ms ease-out both}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.tip-modal-title{font-size:15px;font-weight:700;margin-bottom:10px}
.tip-modal-body{font-size:13px;color:#555;line-height:1.7}
.tip-modal-close{border:none;background:none;font-size:20px;color:#bbb;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.tip-modal-close:hover{color:#888}
/* ── UTILITY CLASSES (D1) — patterns repeated 5+ times ── */
.sec-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sec-title-sm{font-size:12px;font-weight:600;color:#888;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:#888;margin-top:2px}
.flex-between{display:flex;justify-content:space-between;align-items:flex-start}
.flex-between-center{display:flex;justify-content:space-between;align-items:center}
.right-col{text-align:right;flex-shrink:0;margin-left:10px}
.text-warn{font-size:12px;color:#c0392b;margin-top:2px}

function checkAndUnlockAchievements(){
  if(!G.unlockedAchievements)G.unlockedAchievements=[];
  const newUnlocks=[];
  ACHIEVEMENTS.forEach(ach=>{
    if(!G.unlockedAchievements.includes(ach.id)&&ach.check()){
      G.unlockedAchievements.push(ach.id);
      newUnlocks.push(ach);
    }
  });
  if(newUnlocks.length>0){
    newUnlocks.forEach(ach=>{
      showToast(`🏆 Logro: ${ach.label}`, '#c07a10');
    });
  }
  return newUnlocks;
}

function trainingEffFromH(h){
  if(h<=5) return 0.50;
  if(h<=10)return 0.65;
  if(h<=16)return 0.80;
  if(h<=22)return 0.90;
  return 1.00;
}

function assignClubCompanion(club){
  if(!club||club.id==='none'||!club.companions.length) return null;
  return club.companions[Math.floor(Math.random()*club.companions.length)];
}

// Ajuste de stats según edad inicial
// Joven (18): velocidad y bajada altas, poca base aeróbica, sin experiencia
// 25: referencia neutra (= SPEC_STATS base)
// Veterano (35): resistencia/mental/nutricion altos, velocidad y subida mermadas
function applyAgeToStats(stats,age){
  const s={...stats};
  if(age<=18){
    s.velocidad   =Math.min(100,s.velocidad+6);
    s.bajada      =Math.min(100,s.bajada+4);   // sin miedo al descenso
    s.resistencia =Math.max(10, s.resistencia-10); // base aeróbica inmadura
    s.nutricion   =Math.max(10, s.nutricion-12);   // no sabe gestionar el esfuerzo
    s.mental      =Math.max(10, s.mental-8);        // inexperiencia
  } else if(age<=22){
    s.velocidad   =Math.min(100,s.velocidad+4);
    s.bajada      =Math.min(100,s.bajada+2);
    s.resistencia =Math.max(10, s.resistencia-6);
    s.nutricion   =Math.max(10, s.nutricion-7);
    s.mental      =Math.max(10, s.mental-4);
  } else if(age<=25){
    // Referencia neutra — SPEC_STATS sin tocar
  } else if(age<=28){
    s.resistencia =Math.min(100,s.resistencia+4); // pico de forma física
    s.mental      =Math.min(100,s.mental+3);
    s.nutricion   =Math.min(100,s.nutricion+3);
    s.velocidad   =Math.min(100,s.velocidad+1);
  } else if(age<=30){
    s.resistencia =Math.min(100,s.resistencia+5);
    s.mental      =Math.min(100,s.mental+6);       // experiencia de carrera
    s.nutricion   =Math.min(100,s.nutricion+5);
    s.velocidad   =Math.max(10, s.velocidad-2);
    s.subida      =Math.max(10, s.subida-1);
  } else { // 35
    s.resistencia =Math.min(100,s.resistencia+7);
    s.mental      =Math.min(100,s.mental+10);      // veterano curtido
    s.nutricion   =Math.min(100,s.nutricion+8);
    s.velocidad   =Math.max(10, s.velocidad-5);
    s.subida      =Math.max(10, s.subida-4);
    s.bajada      =Math.max(10, s.bajada-2);
  }
  return s;
}

// Puntos por posición en carrera de circuito
function circuitPoints(pos,total){
  if(pos===1)return 50;if(pos===2)return 40;if(pos===3)return 32;
  if(pos<=5)return 25;if(pos<=8)return 18;if(pos<=10)return 12;
  return Math.max(1,Math.round(10*(1-pos/total)));
}

function simClubRace(runner,race){
  const s=runner.stats;
  let base=(s.resistencia*0.35+s.velocidad*0.2+s.subida*0.25+s.bajada*0.2);
  if(runner.spec==='montanero')base+=race.dist>30?4:2;
  if(runner.spec==='fondista')base+=race.dist>40?5:0;
  if(runner.spec==='tecnico')base+=race.dist<25?3:0;
  const rng=(Math.random()*16)-8;
  const perf=Math.max(10,Math.min(95,base+rng));
  const rivals={local:18,regional:35,nacional:70,elite:110}[race.tier||'local']||25;
  const pos=Math.max(1,Math.round((1-perf/100)*rivals*0.85)+1+Math.floor(Math.random()*3));
  const prize=pos===1?race.prize:pos===2?Math.round(race.prize*0.6):pos===3?Math.round(race.prize*0.4):0;
  return{pos,perf:Math.round(perf),prize,rivals};
}

function fmt(s){s=Math.round(s);const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),ss=s%60;return h>0?h+'h '+pad(m)+'m '+pad(ss)+'s':pad(m)+'m '+pad(ss)+'s';}
function pad(n){return String(n).padStart(2,'0');}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');}
function rbar(v,col){const p=Math.max(0,Math.min(100,Math.round(v)));const c=p>50?col:p>25?'#d4920a':'#c0392b';return `<div class="bar-track"><div class="bar-fill" style="width:${p}%;background:${c}"></div></div>`;}

  });
  switch(sp.objKey){
    case'finish2':      return finished>=2;
    case'finish3':      return finished>=3;
    case'finish4':      return finished>=4;
    case'finishSeason': return finished>=1;
    case'race3':        return G.selectedRaces.length>=3;
    case'race4':        return G.selectedRaces.length>=4;
    case'race5':        return G.selectedRaces.length>=5;
    case'top10':        return top10>=1;
    case'top10x2':      return top10>=2;

}
function profSvg(race, activeSeg, mode, raceProgress){
  const W=560,H=100,PT=8,PB=18,PL=4,PR=4;
  const cW=W-PL-PR,cH=H-PT-PB;
  const COL={climb:'#639922',descent:'#E24B4A',flat:'#888780'};
  const COL_LIGHT={climb:'#EAF3DE',descent:'#FCEBEB',flat:'#F1EFE8'};
  const prog=raceProgress||0;
  const selSeg=activeSeg!=null?activeSeg:-1;

  // Build elevation points
  const pts=[{km:0,elev:0,seg:-1}];
  let ck=0,ce=0;
  race.segs.forEach((s,si)=>{
    const steps=Math.max(3,Math.round(s.km*3));
    for(let i=1;i<=steps;i++){ck+=s.km/steps;ce+=s.gain/steps;pts.push({km:ck,elev:ce,seg:si});}
  });
  const elevs=pts.map(p=>p.elev);
  const minE=Math.min(...elevs),maxE=Math.max(...elevs),er=maxE-minE||1;

  // Boundaries — end at actual race km
  let bounds=[0],c=0;
  race.segs.forEach(s=>{c+=s.km;bounds.push(c);});
  const totalKm=race.km;

  const tx=km=>PL+(km/totalKm)*cW;
  const ty=e=>PT+cH-((e-minE)/er)*cH;

  let html='';

  // Fill and line per segment
  race.segs.forEach((s,si)=>{
    const prev=si===0?{km:0,elev:0}:pts.filter(p=>p.seg===si-1).slice(-1)[0]||{km:bounds[si],elev:0};
    const segPts=[{km:bounds[si],elev:prev.elev},...pts.filter(p=>p.seg===si)];
    if(segPts.length<2)return;
    const last=segPts[segPts.length-1];
    const isDone=mode==='race'&&si<prog;
    const isCur=mode==='race'&&si===prog;
    const isSel=si===selSeg;
    const fill=isDone?'#D3D1C7':isSel||isCur?COL[s.type]:COL_LIGHT[s.type];
    const stroke=isDone?'#B4B2A9':COL[s.type];
    const sw=isSel||isCur?2.5:1.5;
    const op=(mode==='race'&&si>prog&&!isSel)?0.55:1;
    const pp=segPts.map(p=>`${tx(p.km).toFixed(1)},${ty(p.elev).toFixed(1)}`).join(' ');
    const cp=` ${tx(last.km).toFixed(1)},${(PT+cH).toFixed(1)} ${tx(bounds[si]).toFixed(1)},${(PT+cH).toFixed(1)}`;
    html+=`<polygon points="${pp}${cp}" fill="${fill}" opacity="${op}"/>`;
    html+=`<polyline points="${pp}" fill="none" stroke="${stroke}" stroke-width="${sw}" stroke-linejoin="round" stroke-linecap="round" opacity="${op}"/>`;
  });

  // Segment dividers
  bounds.slice(1,-1).forEach((k,i)=>{
    const ep=pts.filter(p=>p.seg===i).slice(-1)[0];
    if(!ep)return;
    html+=`<line x1="${tx(k).toFixed(1)}" y1="${ty(ep.elev).toFixed(1)}" x2="${tx(k).toFixed(1)}" y2="${PT+cH}" stroke="#e8e6e0" stroke-width="0.5" stroke-dasharray="3,2"/>`;
  });

  // Baseline
  html+=`<line x1="${PL}" y1="${PT+cH}" x2="${W-PR}" y2="${PT+cH}" stroke="#e0dfd8" stroke-width="0.5"/>`;

  // Aid stations
  race.segs.forEach((s,si)=>{
    if(!s.aid)return;
    const ep=pts.filter(p=>p.seg===si).slice(-1)[0];
    if(!ep)return;
    html+=`<circle cx="${tx(bounds[si+1]).toFixed(1)}" cy="${ty(ep.elev).toFixed(1)}" r="4" fill="#378ADD"/>`;
  });

  // Current position marker in race mode
  if(mode==='race'){
    const cp=pts.filter(p=>p.seg===prog);
    const mid=cp[Math.floor(cp.length/2)];
    if(mid){
      html+=`<circle cx="${tx(mid.km).toFixed(1)}" cy="${ty(mid.elev).toFixed(1)}" r="5" fill="#1a1a1a"/>`;
      html+=`<circle cx="${tx(mid.km).toFixed(1)}" cy="${ty(mid.elev).toFixed(1)}" r="8.5" fill="none" stroke="#1a1a1a" stroke-width="1.5"/>`;
    }
  }

  // Km axis — ends exactly at race.km
  const step=totalKm<=20?5:totalKm<=35?10:10;
  for(let k=0;k<=totalKm;k+=step)
    html+=`<text x="${tx(k).toFixed(1)}" y="${H-3}" text-anchor="middle" font-size="9" fill="#aaa">${k}km</text>`;
  // Always show final km label if not already shown
  if(totalKm%step!==0)
    html+=`<text x="${tx(totalKm).toFixed(1)}" y="${H-3}" text-anchor="middle" font-size="9" fill="#aaa">${totalKm}km</text>`;

  // Transparent tap/click zones
  race.segs.forEach((s,si)=>{
    const x1=tx(bounds[si]),x2=tx(bounds[si+1]);
    html+=`<rect x="${x1.toFixed(1)}" y="${PT}" width="${(x2-x1).toFixed(1)}" height="${cH+2}" fill="transparent" data-seg="${si}" style="cursor:pointer"/>`;
  });

  const svgId=`prof-${race.id}`;
  return `<svg id="${svgId}" viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px;display:block;overflow:visible;cursor:pointer">${html}</svg>`;
}

function profSegInfo(race, si, mode, raceProgress){
  if(si==null||si<0)return `<div style="font-size:12px;color:#aaa;text-align:center;padding:4px 0">Toca un tramo para ver los detalles</div>`;
  const COL={climb:'#639922',descent:'#E24B4A',flat:'#888780'};
  const COL_LIGHT={climb:'#EAF3DE',descent:'#FCEBEB',flat:'#F1EFE8'};
  const TYPE_LABEL={climb:'▲ Subida',descent:'▼ Bajada',flat:'▶ Llano'};
  const prog=raceProgress||0;
  const s=race.segs[si];
  let bounds=[0],c=0;race.segs.forEach(x=>{c+=x.km;bounds.push(c);});
  const kmLeft=race.km-bounds[si];
  const isDone=mode==='race'&&si<prog;
  const isCur=mode==='race'&&si===prog;
  const isAhead=mode==='race'&&si>prog;
  let badge='';
  if(isCur)badge=`<span style="font-size:12px;padding:1px 7px;border-radius:4px;background:${COL_LIGHT[s.type]};color:${COL[s.type]};margin-left:7px">Aquí estás</span>`;
  else if(isDone)badge=`<span style="font-size:12px;padding:1px 7px;border-radius:4px;background:#f5f4f0;color:#888;margin-left:7px">Completado</span>`;
  else if(isAhead)badge=`<span style="font-size:12px;padding:1px 7px;border-radius:4px;background:#f5f4f0;color:#aaa;margin-left:7px">Por delante</span>`;
  const bg=isDone?'#f5f4f0':COL_LIGHT[s.type];
  const border=isDone?'#e0dfd8':COL[s.type];
  return `<div style="margin-top:8px;padding:8px 11px;border-radius:8px;background:${bg};border:0.5px solid ${border}">
    <div style="font-size:13px;font-weight:600;color:${isDone?'#888':COL[s.type]};margin-bottom:2px">${TYPE_LABEL[s.type]} — ${s.name}${badge}</div>
    <div style="font-size:12px;color:#666">${s.km}km${s.gain>0?` · +${s.gain}m`:s.gain<0?` · ${s.gain}m`:''}${s.aid?' · 🔵 Avituallamiento':''}${mode==='race'&&!isDone?` · <strong>${kmLeft.toFixed(0)}km para meta</strong>`:''}</div>
  </div>`;
}

function attachProfHandlers(race, containerId, mode, raceProgress){
  setTimeout(()=>{
    const svg=document.getElementById(`prof-${race.id}`);
    if(!svg)return;
    svg.querySelectorAll('rect[data-seg]').forEach(r=>{
      const handler=()=>{
        const si=parseInt(r.dataset.seg);
        const infoEl=document.getElementById(`prof-info-${containerId}`);
        if(!infoEl)return;
        const cur=infoEl.dataset.sel;
        const next=cur==si?-1:si;
        infoEl.dataset.sel=next;
        infoEl.innerHTML=profSegInfo(race,next>=0?next:null,mode,raceProgress);
        // Redraw with new selection
        const svgWrap=document.getElementById(`prof-wrap-${containerId}`);
        if(svgWrap)svgWrap.innerHTML=profSvg(race,next>=0?next:-1,mode,raceProgress);
        attachProfHandlers(race,containerId,mode,raceProgress);
      };
      r.addEventListener('click',handler);
      r.addEventListener('touchend',e=>{e.preventDefault();handler();});
    });
  },0);
}

function getExpressSponsors(){
  // Returns 2 sponsor candidates appropriate to current year
  const year=G.year||1;
  const tier=year<=1?1:year<=2?2:2;
  const pool=SPONSORS_DB.filter(s=>s.tier===tier||(year>=2&&s.tier===1));
  // One per category variety
  const cats=['zapatillas','ropa','nutricion','tecnologia'];
  const picked=[];
  const shuffled=[...pool].sort(()=>Math.random()-0.5);
  for(const s of shuffled){
    if(!picked.find(p=>p.cat===s.cat))picked.push(s);
    if(picked.length>=2)break;
  }
  // fallback: just first 2
  if(picked.length<2){for(const s of shuffled){if(!picked.includes(s))picked.push(s);if(picked.length>=2)break;}}
  return picked.slice(0,2);
}

function bodyLoadHint(){
  const load=getBodyLoad();
  const fisio=hasFisio();
  if(load>=85)return {type:'danger',msg:'El cuerpo está muy al límite. Cualquier esfuerzo añadido tiene riesgo real de lesión.'};
  if(load>=70&&!fisio)return {type:'warn',msg:'Llevas semanas muy cargado. El cuerpo pide un respiro — sin fisio el riesgo aumenta.'};
  if(load>=70&&fisio)return {type:'warn',msg:'Acumulación de fatiga notable. El fisio ayuda, pero conviene bajar la intensidad.'};
  if(load>=55)return {type:'hint',msg:'Te notas algo cargado últimamente. Nada preocupante, pero el cuerpo lo nota.'};
  if(load>=40)return {type:'hint',msg:'Forma física normal. Llevas buen ritmo de trabajo.'};
  return null;
}

function bodyLoadAfterTraining(blockId){
  const deltas={volumen:18,velocidad:12,tecnico:10,recuperacion:-12,taper:-18,cruzado:4};
  const base=deltas[blockId]||0;
  // Con edad, la recuperación activa es menos efectiva
  const aged=base<0?Math.round(base*(1-agingDeg()*0.5)):base;
  return Math.max(0,Math.min(100,(G.bodyLoad||0)+aged-(hasFisio()?5:0)));
}

function bodyLoadAfterRace(raceKm){
  const add=raceKm>=50?22:raceKm>=35?16:raceKm>=28?12:8;
  const fisioRedux=hasFisio()?6:0;
  const agingExtra=Math.round(agingDeg()*10); // hasta +5 extra pts a los 54
  return Math.max(0,Math.min(100,(G.bodyLoad||0)+add+agingExtra-fisioRedux));
}

function getTrainingEvent(blockId){
  // Solo se activa ~1 de cada 4 trimestres
  if(Math.random()>0.28) return null;
  // Momentum: si llevas 2+ trimestres con el mismo bloque, subir prob de revelation/plateau
  const momentum=G.trainingMomentum;
  let pool=[...TRAINING_EVENTS_POOL];
  if(momentum&&momentum.blockId===blockId&&momentum.count>=2){
    pool=pool.map(e=>({...e,prob:e.id==='revelation'?e.prob*2.2:e.id==='plateau'?e.prob*2.0:e.prob}));
  }
  const total=pool.reduce((a,e)=>a+e.prob,0);
  let r=Math.random()*total;
  for(const ev of pool){if((r-=ev.prob)<=0)return ev;}
  return null;
}

function getTerrainCondition(race){
  // Based on season and recent weather_risk
  const s=getSeason(race.month);
  const roll=Math.random();
  if(s==='invierno'&&roll<0.4)return {id:'nieve',label:'Nieve',icon:'❄',descentMult:1.3,climbMult:1.2,color:'#4a90d9'};
  if(s==='invierno'&&roll<0.7)return {id:'barro',label:'Barro',icon:'🟫',descentMult:1.2,climbMult:1.1,color:'#8B5E3C'};
  if(s==='verano'&&roll<0.3)return {id:'seco',label:'Polvo seco',icon:'🌵',descentMult:1.15,climbMult:1.0,color:'#c07a10'};
  if(race.weather_risk>0.25&&roll<0.3)return {id:'barro',label:'Barro (lluvia reciente)',icon:'🟫',descentMult:1.25,climbMult:1.1,color:'#8B5E3C'};
  return {id:'bueno',label:'Terreno en buen estado',icon:'✅',descentMult:1.0,climbMult:1.0,color:'#4a8a2a'};
}

function getNutritionCost(id){
  const n=PRE_RACE_NUTRITION.find(x=>x.id===id);
  if(!n)return 0;
  // Base cost (pasta) + year-scaling cost (proto pro)
  const base=n.cost||0;
  if(!n.yearCosts)return base;
  const yr=Math.min(G.year, Math.max(...Object.keys(n.yearCosts).map(Number)));
  return base+(n.yearCosts[yr]||n.yearCosts[Object.keys(n.yearCosts)[0]]||0);
}

function isNutritionAvailable(n){
  if(G.year<n.reqYear)return {ok:false,reason:`Disponible desde año ${n.reqYear}`};
  if(n.id==='pro'){
    const req=n.yearReqs?.[G.year];
    if(req==='nutSponsor'&&!G.sponsors.nutricion)
      return {ok:false,reason:'Requiere sponsor de nutrición activo'};
    if(req==='nutSponsorTop10'&&(!G.sponsors.nutricion||G.ranking>10))
      return {ok:false,reason:'Requiere sponsor nutrición + top 10 ranking'};
    if(req==='nutSponsorRanking50'&&(!G.sponsors.nutricion||G.ranking>50))
      return {ok:false,reason:'Requiere sponsor nutrición + ranking < 50'};
  }
  return {ok:true,reason:''};
}

function applyInjuryToRaceStart(){
  if(!G.injuryType)return;
  const inj=INJURY_TYPES[G.injuryType];
  if(!inj)return;
  const ns=inj.nextRaceStats||{};
  if(ns.energy!=null) G.runner.energy=ns.energy;
  if(ns.legs!=null)   G.runner.legs=ns.legs;
  if(ns.hydration!=null) G.runner.hydration=ns.hydration;
}

function getSpecificInjury(paceLog,load){
  const allout=paceLog.filter(p=>p==='allout').length;
  const push=paceLog.filter(p=>p==='push').length;
  let risk=0;
  if(load>=85)risk+=0.25;
  else if(load>=70)risk+=0.12;
  if(allout>=3)risk+=0.15;
  if(allout>=2)risk+=0.08;
  if(hasFisio())risk*=0.35;
  if(Math.random()>risk)return null;
  // Type depends on what dominated
  const descents=(G.selectedRaces[G.currentRaceIdx]?.segs||[]).filter(s=>s.type==='descent').length;
  if(load>=85&&allout>=3)return 'fractura';
  if(descents>=3)return 'tendinitis';
  return 'rotura';
}

function showToast(msg,color='#1a1a1a'){
  const t=document.getElementById('toast-notif');
  if(!t)return;
  t.textContent=msg;
  t.style.background=color;
  t.classList.remove('show');
  void t.offsetWidth; // reflow
  t.classList.add('show');
  clearTimeout(t._tmr);
  t._tmr=setTimeout(()=>t.classList.remove('show'),1800);
}

function renderCalendarTab(){
  const el=document.getElementById('main');
  const selIds=G.selectedRaces.map(r=>r.id);
  const specRaces=getSpecRaces();
  const qLabel={1:'Primer trimestre',2:'Segundo trimestre',3:'Tercer trimestre',4:'Cuarto trimestre'};
  // uses global QUARTERS
  const tierColor=TIER_COLOR_RACE;
  const tierLabel=TIER_LABEL_RACE;
  const canAccess=r=>r.zegamaSpecial?(G.ranking<=20||G.zegamaQual):(G.year===1?r.reqRanking===999:r.reqRanking>=G.ranking||r.reqRanking===999);

  // Calcula qué carreras dan puntos de circuito y cuántos
  function circuitBadge(raceId){
    for(const cid of G.joinedCircuits){
      const c=CIRCUITS_DB.find(x=>x.id===cid);
      if(c&&c.raceIds.includes(raceId)){
        const estPts=circuitPoints(3,15);
        return `<span style="font-size:12px;font-weight:600;padding:1px 5px;border-radius:3px;background:#c07a1022;color:#c07a10">Liga · ~${estPts}pts</span>`;

  function calRaceRow(r){
    const isSel=selIds.includes(r.id);

    const badge=circuitBadge(r.id);

      <div style="flex:1">

      </div>
      <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
        ${isSel?`<span style="font-size:12px;color:#4a8a2a;font-weight:600">✓</span>`:isLocked?`<span style="font-size:12px;color:#ccc">🔒</span>`:''}
        <div class="cal-dot" style="background:${isSel?'#4a8a2a':'#ddd'}"></div>
      </div>
    </div>`;
  }

  el.innerHTML=`
    <h2>Calendario ${G.year}</h2>
    <p class="sub">Tu temporada de un vistazo</p>
    ${G.joinedCircuits.length>0?`<div style="font-size:12px;color:#c07a10;background:#c07a1010;border-radius:8px;padding:8px 12px;margin-bottom:12px">
      🏆 Liga activa — las carreras marcadas con <strong>Liga · ~Xpts</strong> suman puntos al circuito
    </div>`:''}
    ${QUARTERS.map(q=>{
      const common=RACES_DB.filter(r=>r.quarter===q.n);
      const spec=specRaces.filter(r=>r.quarter===q.n);
      const allQ=[...common,...spec];
      const qSel=allQ.filter(r=>selIds.includes(r.id)).length;
      const hasLeague=allQ.some(r=>G.joinedCircuits.some(cid=>CIRCUITS_DB.find(c=>c.id===cid)?.raceIds.includes(r.id)));
      const isOpen=(G.openQuarters?.tab||[]).includes(q.n);
      return `
        <div class="quarter-wrap">
          <div class="quarter-toggle ${qSel>0?'has-sel':''}" onclick="toggleQTab(${q.n})">
            <span style="font-size:14px;font-weight:600;flex:1">${qLabel[q.n]}

            </span>
            ${hasLeague?`<span style="font-size:12px;color:#c07a10;margin-right:6px">🏆</span>`:''}
            ${qSel>0?`<span style="font-size:12px;color:#4a8a2a;font-weight:600;margin-right:6px">${qSel} ✓</span>`:''}
            <span style="font-size:12px;color:#aaa;display:inline-block;transform:${isOpen?'rotate(90deg)':''};transition:transform .2s">▶</span>
          </div>
          <div class="quarter-content ${isOpen?'open':''}" onclick="event.stopPropagation()">
            ${common.map(r=>calRaceRow(r)).join('')}
            ${spec.length>0?`
              <div style="font-size:12px;color:#4a8a2a;font-weight:600;padding:6px 2px 4px">★ Específicas de tu especialidad</div>

        ? `<button class="main" style="border-color:#c07a10;color:#c07a10" onclick="doLaunchBrand()">Lanzar mi marca — −€2.500 · +€300/mes</button>`

      }

      <div style="margin-top:10px">
        <div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:4px">
          <span>€0</span><span>Previsión: €${Math.max(0,G.money+netAfterRaces)}</span>
        </div>
        <div style="height:6px;background:#e5e4de;border-radius:3px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,Math.round(G.money/(G.money+Math.abs(netAfterRaces)+1)*100))}%;background:#4a90d9;border-radius:3px"></div>

const SAVE_KEY='trail_save_slot_';
const SAVE_VERSION='TRAIL_SAVE_V2';
const NUM_SLOTS=5;

function saveToSlot(slot){
  try{
    const data={
      v:SAVE_VERSION,
      ts:Date.now(),
      state:JSON.parse(JSON.stringify(G))
    };
    localStorage.setItem(SAVE_KEY+slot, JSON.stringify(data));
    return true;
  }catch(e){return false;}
}

function loadFromSlot(slot){
  try{
    const raw=localStorage.getItem(SAVE_KEY+slot);
    if(!raw)return null;
    const data=JSON.parse(raw);
    if(!data.state)return null;
    return data;
  }catch(e){return null;}
}

function deleteSlot(slot){
  localStorage.removeItem(SAVE_KEY+slot);
}

function getAllSlots(){
  const slots=[];
  for(let i=0;i<NUM_SLOTS;i++){
    const data=loadFromSlot(i);
    slots.push({slot:i, data});
  }
  return slots;
}

function exportSlotToClipboard(slot){
  const data=loadFromSlot(slot);
  if(!data){alert('Ranura vacía.');return;}
  const txt=SAVE_VERSION+'::'+btoa(unescape(encodeURIComponent(JSON.stringify(data.state))));
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(()=>{
      alert('✓ Partida copiada al portapapeles. Pégala donde quieras para guardarla.');
    }).catch(()=>fallbackCopy(txt));
  } else fallbackCopy(txt);
}

function fallbackCopy(txt){
  const ta=document.createElement('textarea');
  ta.value=txt;ta.style.position='fixed';ta.style.opacity='0';
  document.body.appendChild(ta);ta.focus();ta.select();
  try{document.execCommand('copy');alert('✓ Partida copiada al portapapeles.');}
  catch(e){alert('No se pudo copiar automáticamente. Selecciona el texto manualmente.');}
  document.body.removeChild(ta);
}

function validateState(s){
  if(!s||typeof s!=='object')return false;
  if(!s.runner||typeof s.runner!=='object')return false;
  if(!s.runner.stats||typeof s.runner.stats!=='object')return false;
  if(typeof s.runner.name!=='string')return false;
  if(typeof s.year!=='number'||s.year<1)return false;
  if(typeof s.money!=='number')return false;
  // Sanitize user-editable strings
  s.runner.name=String(s.runner.name||'').slice(0,30);
  s.runName=String(s.runName||'').slice(0,40);
  return true;
}
function importFromText(txt, slot){
  try{
    const clean=txt.trim();
    if(!clean.startsWith(SAVE_VERSION+'::'))throw new Error('Formato no reconocido');
    const b64=clean.slice(SAVE_VERSION.length+2);
    const state=JSON.parse(decodeURIComponent(escape(atob(b64))));
    if(!validateState(state))throw new Error('Estado inválido');
    const data={v:SAVE_VERSION,ts:Date.now(),state};
    localStorage.setItem(SAVE_KEY+slot, JSON.stringify(data));
    return true;
  }catch(e){return false;}
}

function autoSave(){
  if(G._saveSlot==null)return;
  if(G.gameMode==='coach')saveCoachSlot();
  try{saveToSlot(G._saveSlot);}catch(e){}
}

function slotLabel(data){
  if(!data)return null;
  const s=data.state;
  const name=esc(s.runner?.name||'Corredor');
  const runName=esc(s.runName||'');
  const year=s.year||1;
  const ranking=s.ranking<900?'#'+s.ranking:'—';
  const specRanking=s.specRanking&&s.specRanking<900?'#'+s.specRanking:'—';
  const specLabel=SPEC_LABEL;
  const spec=specLabel[s.runner?.specialty]||'—';
  const mode={facil:'🟢 Fácil',medio:'🟡 Medio',dificil:'🔴 Difícil',hardcore:'💀 Hardcore',expres:'⚡ Exprés'}[s.gameMode||'medio'];
  const totalKm=s.totalCareerKm||0;
  const date=new Date(data.ts).toLocaleDateString('es-ES',{day:'2-digit',month:'short'});
  return {name,runName,year,ranking,specRanking,spec,mode,totalKm,date};
}

window.loadSlot=slot=>{
  const data=loadFromSlot(slot);
  if(!data||!data.state){alert('Ranura vacía.');return;}
  if(!validateState(data.state)){alert('Partida corrupta.');return;}
  Object.assign(G,freshState(),data.state);
  render();
};
window.loadAutoSave=()=>{
  const data=loadFromSlot('auto');
  if(!data||!data.state){alert('Sin autoguardado.');return;}
  if(!validateState(data.state)){alert('Autoguardado corrupto.');return;}
  Object.assign(G,freshState(),data.state);
  render();
};
window.saveCurrentToSlot=slot=>{
  if(RACE_SCREENS.includes(G.screen)){alert('No puedes guardar durante una carrera. Termina o abandona primero.');return;}
  if(G.screen==='modeSelect'||G.screen==='saveScreen'){alert('Inicia una partida primero.');return;}
  if(saveToSlot(slot)){
    alert(`✓ Partida guardada en ranura ${slot+1}.`);render();
  }else alert('Error al guardar.');
};
window.startNewInSlot=slot=>{
  Object.assign(G,freshState());
  G._saveSlot=slot;
  G.screen='modeSelect';
  render();
};
window.confirmDeleteSlot=slot=>{
  if(confirm(`¿Borrar la partida de la ranura ${slot+1}? Esta acción no se puede deshacer.`)){
    deleteSlot(slot);render();
  }
};
window.doImport=(slot)=>{
  const txt=document.getElementById('import-txt')?.value||'';
  if(!txt.trim()){alert('Pega primero el texto de la partida.');return;}
  if(importFromText(txt,slot)){
    alert(`✓ Partida importada en ranura ${slot+1}.`);
    document.getElementById('import-txt').value='';
    render();
  } else alert('Texto no válido. Asegúrate de copiar el texto completo.');
};

  const race=G.selectedRaces[G.currentRaceIdx];
  if(!race){G.screen='preRace';render();return;}
  const altPenalty=getAltitudePenalty(race);
  const sel=G.preRaceNutrition||'pasta';

  el.innerHTML=`
    <div style="font-size:12px;font-weight:700;color:#c07a10;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px">⚡ EXPRÉS · Carrera ${G.currentRaceIdx+1}/${G.selectedRaces.length}</div>
    <h2>${race.name}</h2>
    <p class="sub">${race.km}km · ${race.type} · ${race.monthName}</p>
    ${altPenalty>0?`<div class="warn">⚠ Alta altitud — irás un ${Math.round(altPenalty*100)}% más lento en subidas sin preparación específica.</div>`:''}
    ${G.injuryType?`<div class="danger">⚠ Llegas con ${INJURY_TYPES[G.injuryType]?.label||'lesión'}. Energía y piernas reducidas.</div>`:''}
    <div class="section-label">Cena previa</div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
      ${PRE_RACE_NUTRITION.slice(0,2).map(n=>{
        const isSel=sel===n.id;
        const cost=getNutritionCost(n.id);
        return `<div style="background:#fff;border:1.5px solid ${isSel?'#4a8a2a':'#e0dfd8'};border-radius:10px;padding:12px;cursor:pointer;transition:background .15s" onclick="G.preRaceNutrition='${n.id}';render()">
          <div style="font-size:13px;font-weight:600;margin-bottom:3px">${isSel?'✓ ':''} ${n.label}</div>
          <div style="font-size:12px;color:#888">${n.desc}</div>
          <div style="font-size:12px;color:${n.energyBonus>0?'#4a8a2a':'#c07a10'};margin-top:4px">${n.energyBonus>0?'+'+n.energyBonus+' energía':n.energyBonus+' energía'}${cost>0?' · -€'+cost:''}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="section-label">Estrategia de salida</div>
    <div style="display:grid;gap:8px;margin-bottom:16px">
      ${[
        {id:'conservador',label:'Conservador 🐢',desc:'Primeros tramos lentos, últimos con reservas',energyMod:5,legsMod:3,timeMod:1.06},
        {id:'equilibrado',label:'Equilibrado ⚖',desc:'Ritmo constante desde el principio',energyMod:0,legsMod:0,timeMod:1.0},
        {id:'a_tope',label:'A tope 🔥',desc:'Máxima velocidad desde el km 1 — riesgo real',energyMod:-8,legsMod:-6,timeMod:0.94},
      ].map(s=>{
        const isSel=(G.startStrategy||'equilibrado')===s.id;
        return `<div style="background:#fff;border:1.5px solid ${isSel?'#4a8a2a':'#e0dfd8'};border-radius:10px;padding:10px 14px;cursor:pointer;display:flex;justify-content:space-between;align-items:center" onclick="G.startStrategy='${s.id}';render()">
          <div><div style="font-size:13px;font-weight:600">${isSel?'✓ ':''} ${s.label}</div><div style="font-size:12px;color:#888">${s.desc}</div></div>
        </div>`;
      }).join('')}
    </div>
    <button class="main" onclick="G.screen='preRace';render()">Salir a correr →</button>`;
}

window.toggleModeGroup=()=>{
  const c=document.getElementById('modegroup-content');
  const a=document.getElementById('modegroup-arrow');
  if(c){const open=c.classList.toggle('open');if(a)a.style.transform=open?'rotate(90deg)':'';}
};
window.selectMode=id=>{G.gameMode=id;render();};
window.confirmMode=()=>{
  if(G.gameMode==='club'){
    if(G.clubModeData){G.screen='clubHub';render();return;}
    G.screen='clubCreate';render();return;
  }
  if(G.gameMode==='coach'){
    G.coachReputation=G.coachReputation||0;
    // If roster already has athletes, go to hub
    if((G.coachRoster||[]).some(s=>s&&s.coachAthlete)){
      G.screen='coachHub';render();return;
    }
    // First time — init pool and go to athlete selection for slot 0
    G.coachActiveIdx=0;
    if(!G.coachRoster)G.coachRoster=[];
    const shuffled=[...COACH_ATHLETE_POOL].sort(()=>Math.random()-0.5);
    G.coachPool=shuffled.slice(0,3).map(a=>({...a,currentStats:{...a.baseStats}}));
    G.screen='coachSelect';render();return;
  }
  G.screen='intro';render();
};

function renderWorkSetup(){
  const el=document.getElementById('main');
  const q=G.currentQuarter||1;
  const qLabel={1:'Q1 — Ene/Feb/Mar',2:'Q2 — Abr/May/Jun',3:'Q3 — Jul/Ago/Sep',4:'Q4 — Oct/Nov/Dic'};
  const sponsorM=monthlySponsorIncome();
  const canQuit=sponsorM>=FIXED_COSTS.total;
  const curPct=G.workByQuarter[q];
  const qRaces=G.selectedRaces.filter(r=>r.quarter===q);
  const vacQ=G.vacByQuarter?.[q]||0;
  const vacLeft=vacDaysLeft();
  const vacBonus=vacTrainingHBonus(q);
  const wo=WORK_OPTIONS.find(o=>o.pct===curPct)||WORK_OPTIONS[0];
  const totalTrainingH=wo.trainingH+vacBonus;

  el.innerHTML=`
    <h2>Jornada laboral</h2>
    <p class="sub">${qLabel[q]} · ${esc(G.runner.name||'Corredor')}</p>
    ${qRaces.length>0?`<div class="note">Este trimestre tienes ${qRaces.length} carrera${qRaces.length>1?'s':''}: ${qRaces.map(r=>r.name).join(', ')}. Valora bajar jornada o usar vacaciones.</div>`:''}
    ${G.workChangePenalties?.[q]?`<div class="warn">⚠ Cambio brusco de jornada${G.workChangePenalties[q]?.amount>0?' — pierdes €'+G.workChangePenalties[q].amount:''} · eficiencia entrenamiento ${Math.round((G.workChangePenalties[q]?.trainingEff||1)*100)}% este trimestre.</div>`:''}
    <div class="card" style="margin-bottom:14px">
      <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px">Gastos fijos mensuales</div>
      <table class="eco-table">
        <tr><td>Alquiler + comida + transporte</td><td class="right minus">-€${FIXED_COSTS.total}/mes</td></tr>
      </table>
    </div>
    <div class="section-label">¿Cuánto trabajas este trimestre?</div>
    ${WORK_OPTIONS.map(wo2=>{
      const net=wo2.income+sponsorM-FIXED_COSTS.total-(G.club?.cost||0);
      const eff=Math.round(trainingEffFromH(wo2.trainingH+vacBonus)*100);
      const isLocked=wo2.pct===0&&!canQuit;
      const sel=curPct===wo2.pct;
      return `<div class="work-card ${sel?'sel':''} ${isLocked?'locked-work':''}" onclick="${isLocked?'':'setWorkQ('+q+','+wo2.pct+')'}">
        <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
          <div>
            <div class="card-title">${wo2.label}</div>
            <div class="card-sub">${wo2.desc}</div>
          </div>
          ${isLocked?`<span style="font-size:12px;color:#ccc;flex-shrink:0;margin-left:8px">Sin ingresos suficientes</span>`:''}
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;font-size:12px">
          <div><div style="color:#aaa;margin-bottom:2px">Trabajo</div>
            <div style="font-weight:600;color:${wo2.income>0?'#2d7a2d':'#aaa'}">${wo2.income>0?'+€'+wo2.income:'-'}/mes</div></div>
          <div><div style="color:#aaa;margin-bottom:2px">Neto</div>
            <div style="font-weight:600;color:${net>=0?'#2d7a2d':'#c0392b'}">${net>=0?'+':''}€${net}/mes</div></div>
          <div><div style="color:#aaa;margin-bottom:2px">Entreno base</div>
            <div style="font-weight:600;color:#4a90d9">${wo2.trainingH}h/sem</div></div>
        </div>
        <div style="margin-top:8px">
          <div style="display:flex;justify-content:space-between;font-size:12px;color:#aaa;margin-bottom:3px">
            <span>Eficiencia</span><span>${eff}%</span>
          </div>
          ${hbar(eff,100,'#4a90d9')}
        </div>
      </div>`;}).join('')}

    <div class="card" style="margin-top:8px;margin-bottom:14px">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
        <div class="card-title">Vacaciones este trimestre</div>
        <div style="font-size:12px;color:#888">${vacDaysUsed()} / ${G.vacDaysTotal||15} días usados este año</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:8px">
        <button class="secondary" onclick="setVacQ(${q},${Math.max(0,vacQ-1)})" ${vacQ<=0?'disabled':''} style="padding:6px 12px;font-size:16px">−</button>
        <div style="flex:1;text-align:center">
          <div style="font-size:24px;font-weight:700;color:#c07a10">${vacQ}</div>
          <div style="font-size:12px;color:#aaa">días este trimestre</div>
        </div>
        <button class="secondary" onclick="setVacQ(${q},${Math.min(vacLeft+vacQ,vacQ+1)})" ${vacLeft<=0?'disabled':''} style="padding:6px 12px;font-size:16px">+</button>
      </div>
      ${vacQ>0?`<div class="note" style="margin-bottom:0">
        +${vacBonus}h/sem de entrenamiento extra este trimestre

// ── CALENDAR ───────────────────────────
function renderCalendar(){
  const el=document.getElementById('main');
  const canAccess=r=>r.zegamaSpecial?(G.ranking<=20||G.zegamaQual):(r.reqRanking>=G.ranking||r.reqRanking===999);
  const selIds=G.selectedRaces.map(r=>r.id);
  const spent=G.selectedRaces.reduce((a,r)=>a+r.cost,0);
  const budget=G.money;
  const pct=Math.min(100,Math.round(spent/Math.max(1,budget)*100));
  const tierColor=TIER_COLOR_RACE;
  const tierLabel=TIER_LABEL_RACE;
  const specRaces=getSpecRaces();
  const specLabel=SPEC_LABEL;
  const specColor={fondista:'#4a90d9',montanero:'#4a8a2a',tecnico:'#c07a10',todoterreno:'#888'};
  const myColor=specColor[G.runner.specialty]||'#888';
  const myLabel=specLabel[G.runner.specialty]||'';

  function raceCard(r,isSpec){
    const sel=selIds.includes(r.id);
    const locked=!canAccess(r);
    const noMoney=!sel&&(spent+r.cost>budget);
    const inCirc=isInCircuit(r.id);
    const circPts=inCirc?circuitPoints(3,15):0;
    return `<div class="race-card ${sel?'sel':locked?'locked':''}" ${!locked&&!(noMoney&&!sel)?'onclick="toggleRace(\''+r.id+'\')"':''}>
      <div class="flex-between">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap;margin-bottom:2px">
            <span class="card-title">${r.name}</span>
            <span style="font-size:12px;font-weight:600;padding:1px 6px;border-radius:4px;background:${tierColor[r.tier]||'#888'}22;color:${tierColor[r.tier]||'#888'}">${tierLabel[r.tier]||''}</span>
            ${isSpec?`<span style="font-size:12px;font-weight:600;padding:1px 6px;border-radius:4px;background:${myColor}22;color:${myColor}">${myLabel}</span>`:''}
            ${inCirc?`<span style="font-size:12px;font-weight:600;padding:1px 5px;border-radius:4px;background:#c07a1022;color:#c07a10">Liga · ~${circPts}pts</span>`:''}
          </div>
          <div style="font-size:12px;color:#888">${r.monthName} · ${r.type} · ${r.desnivel}</div>
          ${locked?(r.zegamaSpecial?`<div style="font-size:12px;color:#c07a10;margin-top:2px">🏔️ Invitación Top 20 o clasificación por tiempo (corte 4h20)</div>`:`<div style="font-size:12px;color:#ccc;margin-top:2px">🔒 Ranking #${r.reqRanking} requerido</div>`):''}
          ${noMoney&&!sel?`<div class="text-warn">Sin presupuesto</div>`:''}
          ${isSpec?`<div style="font-size:12px;color:${myColor};margin-top:2px">+15% rendimiento para ${myLabel}</div>`:''}
        </div>
        <div class="right-col">
          <div style="font-size:13px;font-weight:600;color:#4a8a2a">€${r.prize}</div>
          <div style="font-size:12px;color:#aaa">€${r.cost} inscr.</div>
          ${sel?`<div style="font-size:12px;color:#4a8a2a;font-weight:600;margin-top:2px">✓</div>`:''}
        </div>
      </div>
    </div>`;
  }

  el.innerHTML=`
    <h2>Calendario anual</h2>
    <p class="sub">Comunes + específicas de ${myLabel} · €${spent} de €${budget} gastados</p>
    <div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;font-size:12px;color:#888;margin-bottom:4px">
        <span>Presupuesto de inscripciones <button class="tip-btn" onclick="showTip('Barra de presupuesto','Esta barra muestra qué porcentaje de tus ahorros llevas gastado en inscripciones de carrera. No es la carga corporal — eso lo puedes ver en la pestaña Corredor.<br><br>Si llega al 85% se vuelve roja: ojo con dejar reservas para imprevistos.')">ⓘ</button></span>
        <span style="font-weight:600;color:${pct>85?'#c0392b':pct>50?'#c07a10':'#888'}">${pct}% (€${spent} / €${budget})</span>
      </div>
      <div style="height:4px;background:#e8e6e0;border-radius:2px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:${pct>85?'#c0392b':'#4a90d9'};border-radius:2px;transition:width .3s"></div>
      </div>
    </div>
    ${G.joinedCircuits.length>0?`<div class="note" style="margin-bottom:12px">
      <span style="font-weight:600">Circuito${G.joinedCircuits.length>1?'s':''} activo${G.joinedCircuits.length>1?'s':''}:</span>
      ${G.joinedCircuits.map(cid=>CIRCUITS_DB.find(c=>c.id===cid)?.name||cid).join(', ')}
      — las carreras de liga están marcadas con <span style="color:#c07a10;font-weight:600">Liga</span>
    </div>`:
    `<div onclick="G.screen='circuits';render()" style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border:1.5px dashed #e0dfd8;border-radius:10px;cursor:pointer;margin-bottom:12px">
      <div>
        <div class="card-title">🏆 Ligas y circuitos</div>
        <div class="card-sub">Únete para ganar puntos y premios extra este año</div>
      </div>
      <span style="color:#aaa;font-size:14px">→</span>
    </div>`}
    ${QUARTERS.map(q=>{
      const common=RACES_DB.filter(r=>r.quarter===q.n);
      const spec=specRaces.filter(r=>r.quarter===q.n);
      const qSel=[...common,...spec].filter(r=>selIds.includes(r.id)).length;
      const qLabel={1:'Primer trimestre',2:'Segundo trimestre',3:'Tercer trimestre',4:'Cuarto trimestre'};
      const isOpen=(G.openQuarters?.cal||[]).includes(q.n);
      return `
        <div class="quarter-wrap">
          <div class="quarter-toggle ${qSel>0?'has-sel':''}" onclick="toggleQ(${q.n})">
            <span style="font-size:14px;font-weight:600;flex:1">${qLabel[q.n]} <span style="font-size:12px;font-weight:400;color:#aaa">· ${q.months}</span></span>
            ${qSel>0?`<span style="font-size:12px;color:#4a8a2a;font-weight:600">${qSel} ✓</span>`:''}
            <span style="font-size:12px;color:#aaa;display:inline-block;transform:${isOpen?'rotate(90deg)':''};transition:transform .2s">▶</span>
          </div>
          <div class="quarter-content ${isOpen?'open':''}" onclick="event.stopPropagation()">
            ${common.map(r=>raceCard(r,false)).join('')}
            ${spec.length>0?`
              <div class="spec-toggle" id="spec-toggle-${q.n}" onclick="event.stopPropagation();toggleSpecQ(${q.n})">
                <span style="color:${myColor}">★</span>
                <span style="flex:1">Carreras específicas — ${myLabel} (${spec.length})</span>
                <span class="spec-arrow" id="spec-arrow-${q.n}">▶</span>
              </div>
              <div class="spec-races" id="spec-races-${q.n}">
                ${spec.map(r=>raceCard(r,true)).join('')}
              </div>`:''}
          </div>
        </div>`;}).join('')}
    <div style="font-size:13px;color:#888;margin:8px 0 12px">
      ${G.selectedRaces.length===0?'Sin carreras — puedes continuar igualmente.':G.selectedRaces.length+' carrera'+(G.selectedRaces.length>1?'s':'')+' seleccionada'+(G.selectedRaces.length>1?'s':'')+'.'}
    </div>
    <div class="grid-2">
      <button class="main" onclick="G.screen='seasonStart';render()">← Volver</button>
      <button class="main" onclick="G.screen='sponsors';render()">Patrocinios →</button>
    </div>`;
}

window.toggleQ=q=>{
  if(!G.openQuarters)G.openQuarters={cal:[],mid:[],tab:[]};
  const arr=G.openQuarters.cal;
  const idx=arr.indexOf(q);
  if(idx>=0)arr.splice(idx,1);else arr.push(q);
  render();
};
window.toggleSpecQ=q=>{
  const panel=document.getElementById('spec-races-'+q);
  const arrow=document.getElementById('spec-arrow-'+q);
  if(panel){panel.classList.toggle('open');if(arrow)arrow.classList.toggle('open');}
};

function renderSponsors(){
  const el=document.getElementById('main');

    if(s.reqYear&&G.year<s.reqYear)return false;
    if(s.reqRanking&&G.ranking>s.reqRanking)return false;
    return true;
  });
  const locked=SPONSORS_DB.filter(s=>!avail.includes(s));

  el.innerHTML=`
    <h2>Patrocinios <button class="tip-btn" onclick="showTip('Patrocinios','Cada sponsor tiene un <strong>objetivo</strong> que cumplir al final del contrato (victorias, ranking, carreras completadas). Si no lo cumples pagas una <strong>penalización</strong> del porcentaje indicado sobre tu salario anual.<br><br>Romper el contrato antes de tiempo cuesta el <strong>40% del valor restante</strong>. Los contratos de varios años pagan más pero el compromiso es mayor.')">ⓘ</button></h2>

    <div class="danger" style="margin-bottom:14px">
      <div style="font-weight:600;margin-bottom:6px">Penalizaciones por incumplimiento</div>
      ${G.sponsorPenalties.map(p=>`<div style="font-size:13px;display:flex;justify-content:space-between;margin-bottom:4px">
        <span>${p.name}</span>
        <span style="font-weight:600">-€${p.amount} <button class="secondary" style="font-size:12px;padding:2px 8px;margin-left:8px" onclick="payPenalty('${p.id}')">Pagar</button></span>
      </div>`).join('')}

    ${cats.map(cat=>{

      const objMet=cur?checkSponsorObjective(cur):null;

      return `<div style="margin-bottom:20px">
        <div style="font-size:12px;font-weight:600;color:#888;margin-bottom:8px;text-transform:uppercase;letter-spacing:.5px">${catLabel[cat]}</div>

        ${cur?`<div style="padding:10px 12px;background:#f0f6ff;border-radius:8px;border:1px solid #4a90d9;margin-bottom:10px;font-size:12px">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
            <div style="flex:1">
              <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;margin-bottom:3px">

                <span style="font-size:11px;padding:1px 5px;border-radius:4px;background:${tierColor[cur.tier]||'#888'}22;color:${tierColor[cur.tier]||'#888'}">${tierLabel[cur.tier]||'?'}</span>
                <span style="color:${objMet?'#4a8a2a':'#c0392b'};font-weight:600;font-size:11px">${objMet?'✓ Objetivo cumplido':'⚠ Pendiente'}</span>
              </div>
              <div style="color:#888">Obj: ${cur.objective} · <strong>${cur.duration}</strong> temp. restante${cur.duration!==1?'s':''}</div>
              ${!objMet?`<div style="color:#c0392b;margin-top:2px">Penalización si no cumples: €${Math.round(cur.salary*cur.penaltyPct)}</div>`:''}
            </div>
            <button class="secondary" onclick="breakSponsorContract('${cat}')" style="font-size:11px;padding:5px 9px;flex-shrink:0;color:#c0392b;border-color:#c0392b;background:#fff8f0;text-align:center;line-height:1.3">Romper<br><span style="font-size:10px">-€${Math.round(cur.salary*cur.duration*0.4)}</span></button>
          </div>
        </div>
        ${offers.filter(sp=>sp.id!==cur.id).length>0?`<div style="font-size:12px;color:#aaa;font-style:italic;margin-bottom:6px">Otras ofertas (rompe el contrato para cambiar):</div>
        ${offers.filter(sp=>sp.id!==cur.id).map(sp=>`<div style="background:#fafafa;border:1px solid #eee;border-radius:10px;padding:10px 14px;margin-bottom:6px;opacity:0.5">

            <div>
              <span style="font-size:13px;font-weight:600;color:#aaa">${sp.name}</span>
              <span style="font-size:11px;font-weight:600;padding:1px 5px;border-radius:4px;background:${tierColor[sp.tier]}22;color:${tierColor[sp.tier]};margin-left:5px">${tierLabel[sp.tier]}</span>
              ${sp.tier>cur.tier?`<span style="font-size:11px;color:#c07a10;font-weight:700;margin-left:4px">⬆ Upgrade</span>`:''}
            </div>
            <span style="font-size:13px;font-weight:600;color:#aaa">+€${sp.salary}/año</span>
          </div>
        </div>`).join('')}`:''}`:''
        }
        ${!cur?offers.map(sp=>`<div class="sponsor-card" onclick="selectSponsor('${cat}','${sp.id}')">

            ${lockedOffers.slice(0,1).map(sp=>`<div style="padding:8px 12px;background:#fafafa;border-radius:8px;border:0.5px dashed #ddd;font-size:12px;color:#bbb;display:flex;justify-content:space-between">
              <span>🔒 ${sp.name} · ${tierLabel[sp.tier]}</span>

          </div>`:''}

        ${offers.length===0&&lockedOffers.length===0?`<div style="font-size:13px;color:#ccc;padding:6px 0">Sin ofertas esta temporada.</div>`:''}
      </div>`;}).join('')}

}

window.payPenalty=id=>{
  if(!G.sponsorPenalties)return;
  const idx=G.sponsorPenalties.findIndex(p=>p.id===id);
  if(idx<0)return;
  const p=G.sponsorPenalties[idx];
  G.money=Math.max(0,G.money-p.amount);
  G.sponsorPenalties.splice(idx,1);
  render();
};

window.toggleDropbag=id=>{
  if(!G.dropbagItems)G.dropbagItems=[];
  const idx=G.dropbagItems.indexOf(id);
  if(idx>=0)G.dropbagItems.splice(idx,1);
  else if(G.dropbagItems.length<2)G.dropbagItems.push(id);
  render();
};

// ══════════════════════════════════════
//  CONDICIÓN DEL DÍA DE CARRERA
// ══════════════════════════════════════
function initRace(){
  const race=G.selectedRaces[G.currentRaceIdx];
  if(!race||G._raceInitialized)return;
  G._raceInitialized=true;

  G.weather=Math.random()<race.weather_risk?'extremo':Math.random()>0.5?'soleado':'nublado';
  G.runner.energy=100;G.runner.hydration=100;
  G.runner.legs=G.legsPenalty?82:100;G.legsPenalty=false;
  G.time=0;G.seg=0;G.raceEvent='';G.aidSelected=[];
  // ── Condición del día (genera solo una vez por carrera) ───────────
  if(!G.dayConditionGenerated){
    const dayRoll=Math.random();
    const conditions=[
      {id:'normal',        w:0.40, icon:'', label:'',             energyMod:0,  legsMod:0, hydMod:0},
      {id:'buena_noche',   w:0.12, icon:'😴', label:'Dormiste como un tronco.',   energyMod:5,  legsMod:0,  hydMod:0},
      {id:'mala_noche',    w:0.12, icon:'😶', label:'Noche irregular. Las piernas no están finas.', energyMod:0, legsMod:-5, hydMod:0},
      {id:'estomago',      w:0.10, icon:'🤢', label:'El estómago no está fino esta mañana.',energyMod:0, legsMod:0,  hydMod:-8},
      {id:'piernas_mal',   w:0.10, icon:'🦵', label:'Las piernas llevan días sin recuperar del todo.', energyMod:0, legsMod:-8, hydMod:0},
      {id:'dia_especial',  w:0.08, icon:'⚡', label:'Sin explicación, esta mañana todo fluye.',energyMod:7, legsMod:5,  hydMod:0},
      {id:'calor_extra',   w:0.08, icon:'🌡', label:'Más calor de lo previsto. Bebe antes de salir.',energyMod:-3,legsMod:0, hydMod:-5},
    ];
    let cumul=0;
    let picked=conditions[0];
    for(const c of conditions){cumul+=c.w;if(dayRoll<=cumul){picked=c;break;}}
    G.dayCondition=picked.id==='normal'?null:picked;
    G.dayConditionGenerated=true;
  }

  // Generar 14 rivales del pool según tier de carrera
  const maxTier=race.reqRanking===999?1:race.reqRanking<=15?3:race.tier==='nacional'?2:race.tier==='elite'?3:2;
  const pool=[...RIVALS_POOL.filter(r=>r.tier<=maxTier)];
  const shuffled=pool.sort(()=>Math.random()-0.5).slice(0,14);

  // Escalar dificultad por tier de carrera
  const tierDiffMult={local:1.15,regional:1.08,nacional:1.02,elite:0.97};
  const diffMult=tierDiffMult[race.tier]||1.0;
  // Escalado de dificultad por año según modo:
  // fácil/medio: rivales algo más lentos al inicio (pequeño margen de aprendizaje)
  // difícil/hardcore: rivales cada año más rápidos (presión creciente)
  const _ybCfg={
    facil:    {scale: 0.010, cap:  0.05},
    medio:    {scale: 0.015, cap:  0.08},
    dificil:  {scale:-0.022, cap: -0.13},
    hardcore: {scale:-0.030, cap: -0.18},
    expres:   {scale:-0.015, cap: -0.03},
  }[G.gameMode||'medio']||{scale:0.015,cap:0.08};
  const _ybRaw=(G.year-1)*_ybCfg.scale;
  const yearBonus=_ybCfg.scale<0?Math.max(_ybCfg.cap,_ybRaw):Math.min(_ybCfg.cap,_ybRaw);

  G.rivals=shuffled.map(r=>{
    let rankingRange;
    if(r.tier===1){rankingRange=[200,500];}
    else if(r.tier===2){rankingRange=[50,200];}
    else{rankingRange=[1,50];}
    const ranking=Math.floor(rankingRange[0]+Math.random()*(rankingRange[1]-rankingRange[0]));
    const winsProb={1:0.2,2:0.45,3:0.7}[r.tier]||0.3;
    const recentWins=Math.random()<winsProb?Math.floor(1+Math.random()*(r.tier*1.5)):0;
    const ageRanges={3:[20,36],2:[24,44],1:[28,56]};
    const ar=ageRanges[r.tier]||[24,44];
    const rivalAge=Math.floor(ar[0]+Math.random()*(ar[1]-ar[0]));
    return {
      name:r.name,spec:r.spec,flag:r.flag||'',country:r.country||'',time:0,
      mult:(r.base*diffMult*modeCfg().rivalMult*(0.96+Math.random()*0.08)*(1-agingDeg()*0.25))+yearBonus,
      ranking,recentWins,age:rivalAge
    };
  });
  G.liveClass=[];
  G.aidSelected=[];
  G.terrainCondition=getTerrainCondition(race);
  G.paceLog=[];
  G.midRaceEventTriggered={};G.midRaceEvent=null;G.stormActive=false;G.stormProtected=false;

  // ── Mental momentum (p6) — racha de resultados recientes ─────────
  const recentResults=(G.raceResults||[]).filter(r=>r.pos>0).slice(-4);
  let mentalMom=0;
  if(recentResults.length>=2){
    const goodCount=recentResults.filter(r=>r.pos<=Math.ceil(10+(r.all?.length||15)*0.3)).length;
    const badCount=recentResults.filter(r=>r.zeroedOut||r.pos>Math.ceil((r.all?.length||15)*0.7)).length;
    const abandonRecent=(G.raceResults||[]).slice(-3).filter(r=>r.pos===0&&!r.injured).length;
    if(goodCount>=2)mentalMom=Math.min(5,goodCount);
    if(badCount>=2||abandonRecent>=1)mentalMom=Math.max(-5,-(badCount+abandonRecent*2));
  }
  G.mentalMomentum=mentalMom;
  // Apply pre-race nutrition
  const nutr=PRE_RACE_NUTRITION.find(n=>n.id===(G.preRaceNutrition||'pasta'))||PRE_RACE_NUTRITION[0];
  const nutrCost=getNutritionCost(nutr.id);
  if(nutrCost>0)G.money=Math.max(0,G.money-nutrCost);
  G.fatBurning=(nutr.id==='ayuno');
  // Coste de geles en bolsillo
  if((G.gelsCarried||0)>0){const gelCost=(G.gelsCarried||0)*2;G.money=Math.max(0,G.money-gelCost);G.gelsUsed=0;}
  const injStart=G.injuryType?INJURY_TYPES[G.injuryType]?.nextRaceStats:null;
  const energyCap=nutr.id==='pro'?110:100;

  // ── Aplicar condición del día ────────────────────────────────────
  const dayEnergyMod=G.dayCondition?.energyMod||0;
  const dayLegsMod=G.dayCondition?.legsMod||0;
  const dayHydMod=G.dayCondition?.hydMod||0;

  // ── Aplicar taper bonus ──────────────────────────────────────────
  const taperE=G.taperBonus?6:0;
  const taperL=G.taperBonus?6:0;

  G.runner.energy=injStart?injStart.energy:Math.min(energyCap,Math.round((100+nutr.energyBonus+dayEnergyMod+taperE)*(G.nextRaceEnergyStart!=null?G.nextRaceEnergyStart/100:1)));
  G.runner.hydration=injStart?injStart.hydration:Math.min(100,(G.nextRaceHydrationStart??100)+dayHydMod);
  G.runner.legs=injStart?injStart.legs:Math.min(100,(G.legsPenalty?82:100)*(G.nextRaceLegsStart!=null?G.nextRaceLegsStart/100:1)+dayLegsMod+taperL);
  G.legsPenalty=false;
  // Mental momentum: modifica temporalmente el stat mental para la carrera
  if(!injStart&&G.mentalMomentum!==0){
    G.runner.stats.mental=Math.max(10,Math.min(100,G.runner.stats.mental+G.mentalMomentum));
  }
  // Warmup bonus (p9) — temporal para esta carrera
  if(G.warmedUp&&!injStart){
    G.runner.energy=Math.max(10,G.runner.energy-5);
    G._warmupApplied=true;
    G.runner.stats.velocidad=Math.min(100,G.runner.stats.velocidad+4);
    G.runner.stats.subida=Math.min(100,G.runner.stats.subida+3);
  }
  G.nextRaceEnergyStart=null;G.nextRaceLegsStart=null;G.nextRaceHydrationStart=null;
  G.postRaceConsequence=null;
  G.preDegradMult=1.0;
}

function renderPreRace(){
  const race=G.selectedRaces[G.currentRaceIdx];
  if(!race){applyTraining();G.screen='seasonBalance';render();return;}
  // Init race state only once per race (safe to re-render without side effects)
  initRace();
  const el=document.getElementById('main');
  const wlabel={soleado:'Soleado ☀',nublado:'Nublado ☁',extremo:'Condiciones extremas ⚠',tormenta:'Tormenta ⛈'};
  const hint=bodyLoadHint();
  const se=getSeasonEffects(race.month);
  const altPenalty=getAltitudePenalty(race);
  const rep=getReputationBonus(race.id);

  // ── PB de esta carrera ───────────────────────────────────────────

// ── LIVE CLASSIFICATION ────────────────
function liveClassPanel(){
  if(!G.rivals||G.rivals.length===0||G.seg===0)return '';
  const all=[{name:G.runner.name||'Tú',time:G.time,me:true},...G.rivals.map(r=>({name:r.name,time:r.time,me:false}))].sort((a,b)=>a.time-b.time);
  const myPos=all.findIndex(x=>x.me);
  const start=Math.max(0,myPos-2);
  const end=Math.min(all.length,start+5);
  const slice=all.slice(start,end);
  const myTime=G.time;
  return `<div class="live-class">
    <div class="live-class-title">Clasificación · ${myPos+1}º de ${all.length}</div>
    ${slice.map((r,i)=>{
      const absPos=start+i;
      const gap=r.me?'—':r.time<myTime?'-'+fmt(myTime-r.time):'+'+fmt(r.time-myTime);
      const flagHtml=r.flag?`<span title="${r.country||''}" style="cursor:default;font-size:13px">${r.flag}</span> `:'';
      return `<div class="live-row ${r.me?'me':''}">
        <span class="live-pos" style="color:${absPos===0?'#c07a10':'#bbb'}">${absPos+1}º</span>
        <span class="live-name">${flagHtml}${r.name}${r.me?' ◀':''}</span>
        <span class="live-gap">${gap}</span>
      </div>`;}).join('')}
  </div>`;
}
