<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego Trail · v57</title>
<style>
:root{--color-background-primary:#fff;--color-background-secondary:#f8f7f3;--color-background-tertiary:#f0ede8;--color-text-primary:#1a1a1a;--color-text-secondary:#888;--color-text-tertiary:#aaa;--color-border-tertiary:#e0dfd8;--border-radius-md:8px;--border-radius-lg:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f4f0;color:#1a1a1a;min-height:100vh;display:flex;justify-content:center;padding:1.5rem 1rem 5rem}
#app{width:100%;max-width:560px}
#tab-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:560px;background:#fff;border-top:1px solid #e8e6e0;display:none;z-index:200}
.tab-nav-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr}
.tab-btn{padding:10px 4px 12px;text-align:center;cursor:pointer;border:none;background:none;transition:background .15s;border-top:2px solid transparent;width:100%}
.tab-btn:hover{background:#f8f7f3}
.tab-btn.active{border-top-color:#1a1a1a}
.tab-icon{font-size:18px;display:block;margin-bottom:2px}
.tab-label{font-size:12px;font-weight:600;color:#888;letter-spacing:.3px;text-transform:uppercase}
.tab-btn.active .tab-label{color:#1a1a1a}
.quarter-wrap{border:1.5px solid #1a1a1a;border-radius:10px;margin-bottom:10px;overflow:hidden}
.quarter-toggle{display:flex;align-items:center;gap:10px;padding:11px 14px;cursor:pointer;background:#fff;transition:background .15s}
.quarter-toggle:hover{background:var(--color-background-secondary)}
.quarter-toggle.has-sel{background:#f2faf0}
.quarter-content{display:none;padding:10px 10px 6px;border-top:1px solid #e8e6e0;background:#fafaf8}
.quarter-content.open{display:block}
.cal-race{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;border-radius:8px;margin-bottom:6px}
.cal-race.sel{background:#f2faf0;border:1px solid #b8ddb8}
.cal-race.avail{background:#f8f7f3;border:1px solid #e8e6e0}
.cal-race.lock{background:#fafafa;border:1px solid #eee;opacity:0.5}
.cal-race-name{font-size:13px;font-weight:500}
.cal-race-meta{font-size:12px;color:#aaa;margin-top:1px}
.cal-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-left:8px}
.fin-section{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.fin-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.fin-row{display:flex;justify-content:space-between;font-size:14px;padding:6px 0;border-bottom:1px solid #f5f4f0}
.fin-row:last-child{border-bottom:none}
.fin-row.tot{font-weight:700;border-top:1px solid #e0dfd8;margin-top:4px;padding-top:10px;font-size:15px}
.plus{color:#2d7a2d}
.minus{color:#c0392b}
h1{font-size:26px;font-weight:700;margin-bottom:2px}
h2{font-size:20px;font-weight:700;margin-bottom:2px}
p.sub{color:#777;font-size:14px;margin-bottom:18px}
.field-label{font-size:13px;color:#888;display:block;margin-bottom:6px}
input[type=text]{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:15px;margin-bottom:18px;outline:none;background:#fff}
input[type=text]:focus{border-color:#999}
button.main{width:100%;padding:12px;border:1px solid #bbb;border-radius:8px;background:#fff;font-size:15px;cursor:pointer;font-weight:500;transition:background .15s;margin-top:6px}
button.main:hover:not([disabled]){background:#ece9e3}
button.main[disabled]{opacity:0.35;cursor:default}
button.secondary{padding:8px 14px;border:1px solid #ddd;border-radius:6px;background:#fff;font-size:13px;cursor:pointer;transition:background .15s}
button.secondary:hover{background:#f0ede8}
.card{background:#fff;border:1px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:12px}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.spec{border:1px solid #ddd;border-radius:8px;padding:11px 13px;cursor:pointer;transition:background .15s}
.spec:hover{background:#f5f4f0}
.spec.sel{border-color:#999;background:#f0ede8}
.spec-label{font-size:14px;font-weight:600;margin-bottom:2px}
.spec-desc{font-size:12px;color:#888}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:6px}
.bar-label{font-size:12px;color:#666;width:96px;flex-shrink:0}
.bar-track{flex:1;height:6px;background:#e5e4de;border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.bar-pct{font-size:12px;font-weight:500;min-width:30px;text-align:right}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.stat{background:#f5f4f0;border-radius:8px;padding:10px;text-align:center}
.stat-label{font-size:12px;color:#999;margin-bottom:3px;line-height:1.3}
.stat-val{font-size:14px;font-weight:700}
.race-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.race-card:hover{background:#f8f7f3}
.race-card.sel{border-color:#4a8a2a;background:#f2faf0}
.race-card.locked{opacity:0.4;cursor:default}
.sponsor-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.sponsor-card:hover{background:#f8f7f3}
.sponsor-card.active{border-color:#4a90d9;background:#f0f6ff}
.train-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;cursor:pointer;transition:background .15s;margin-bottom:8px}
.train-card:hover{background:#f8f7f3}
.train-card.sel{border-color:#4a90d9;background:#f0f6ff}
.work-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.work-card:hover:not(.locked-work){background:#f8f7f3}
.work-card.sel{border-color:#1a1a1a;background:#f5f4f0}
.work-card.locked-work{opacity:0.35;cursor:default}
.seg-card{border:1px solid #ddd;border-radius:12px;padding:13px 16px;margin-bottom:10px}
.pace-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.pace{border:1px solid #ddd;border-radius:8px;padding:12px;cursor:pointer;transition:background .15s;background:#fff}
.pace:hover{background:#f5f4f0}
.pace-label{font-size:13px;font-weight:600;margin-bottom:2px}
.pace-desc{font-size:12px;color:#888;margin-bottom:6px}
.pace-meta{display:flex;justify-content:space-between;font-size:12px;color:#aaa}
.aid-row{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;border:1px solid #ddd;border-radius:8px;cursor:pointer;margin-bottom:8px;transition:background .15s;background:#fff}
.aid-row:hover:not(.disabled){background:#f5f4f0}
.aid-row.disabled{opacity:0.4;cursor:default}
.aid-row.sel-aid{border-color:#4a8a2a;background:#f2faf0}
.finish-time{background:#f5f4f0;border-radius:12px;padding:18px;text-align:center;margin-bottom:16px}
.finish-time .label{font-size:12px;color:#888;margin-bottom:4px}
.finish-time .val{font-size:32px;font-weight:700}
.prog-wrap{margin-bottom:12px}
.prog-meta{display:flex;justify-content:space-between;font-size:12px;color:#999;margin-bottom:4px}
.prog-track{height:3px;background:#e5e4de;border-radius:2px;overflow:hidden}
.prog-fill{height:100%;background:#4a90d9;border-radius:2px;transition:width .4s}
.event-box{font-size:13px;color:#666;font-style:italic;background:#f5f4f0;padding:9px 12px;border-radius:8px;margin-bottom:10px}
.warn{background:#fef9ec;border:1px solid #f0d98a;border-radius:8px;padding:10px 13px;font-size:13px;color:#7a5a10;margin-bottom:12px}
.notif-dot{display:inline-block;width:9px;height:9px;border-radius:50%;background:#4a8a2a;flex-shrink:0;box-shadow:0 0 0 2px #fff}
.notif-dot.urgent{background:#c0392b}
.coach-slot-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:12px;padding:14px 16px;margin-bottom:10px;cursor:pointer;transition:all .15s;position:relative}
.coach-slot-card:hover{background:#f8f7f3;border-color:#bbb}
.coach-slot-card.active-slot{border-color:#4a90d9;background:#f0f6ff}
.coach-slot-card.empty-slot{border:1.5px dashed #ccc;background:#fafaf8;opacity:0.7}
.coach-slot-card.locked-slot{border:1.5px dashed #e0dfd8;background:#fafaf8;opacity:0.45;cursor:default}
.slot-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px}
.slot-tab{padding:6px 12px;border-radius:20px;border:1.5px solid #e0dfd8;background:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;display:flex;align-items:center;gap:6px}
.slot-tab:hover{background:#f5f4f0}
.slot-tab.active{border-color:#1a1a1a;background:#1a1a1a;color:#fff}
.delegated-badge{display:inline-block;background:#f0f6ff;color:#4a90d9;font-size:11px;font-weight:600;padding:2px 7px;border-radius:10px;border:1px solid #b8d4f0}
.club-runner-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.club-runner-card:hover{background:#f8f7f3}
.club-runner-card.sel{border-color:#4a8a2a;background:#f2faf0}
.club-runner-card.assigned{border-color:#4a90d9;background:#f0f6ff}
.club-stat-pill{display:inline-block;background:#f0ede8;border-radius:4px;padding:2px 6px;font-size:11px;font-weight:600;color:#555;margin-right:4px}
.club-level-badge{display:inline-block;padding:3px 10px;border-radius:12px;font-size:12px;font-weight:700}
.club-race-row{background:#fff;border:1px solid #e0dfd8;border-radius:8px;padding:10px 14px;margin-bottom:6px}
.socios-bar{height:6px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:4px}
.socios-fill{height:100%;border-radius:3px;transition:width .4s}
.note{background:#eaf4ea;border:1px solid #b8ddb8;border-radius:8px;padding:10px 13px;font-size:13px;color:#2d5a2d;margin-bottom:12px}
.danger{background:#fef0f0;border:1px solid #f5b8b8;border-radius:8px;padding:10px 13px;font-size:13px;color:#7a1010;margin-bottom:12px}
.hint{background:#f5f4f0;border:1px solid #e8e6e0;border-radius:8px;padding:9px 13px;font-size:13px;color:#666;margin-bottom:12px;font-style:italic}
.load-bar-wrap{margin-bottom:14px}
.load-bar-track{height:5px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:4px}
.month-badge{display:inline-block;font-size:12px;font-weight:600;padding:2px 7px;border-radius:4px;margin-right:4px}
/* Terrain & injury badges */
.terrain-badge{font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px;display:inline-block;margin-right:4px}
.injury-card{background:#fff;border:1.5px solid #f5b8b8;border-radius:10px;padding:13px 16px;margin-bottom:10px}
.injury-type{font-size:15px;font-weight:700;color:#7a1010;margin-bottom:4px}
.abandon-btn{width:100%;padding:11px;border:1.5px solid #c0392b;border-radius:8px;background:#fef0f0;color:#c0392b;font-size:14px;font-weight:600;cursor:pointer;margin-top:8px;transition:background .15s}
.abandon-btn:hover{background:#fdd}
/* Mode select screen */
.carrera-group{border:1.5px solid #1a1a1a;border-radius:12px;margin-bottom:8px;overflow:hidden}
.carrera-group-header{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;background:var(--color-background-primary);transition:background .15s}
.carrera-group-header:hover{background:var(--color-background-secondary)}
.carrera-group-content{border-top:1px solid var(--color-border-tertiary);background:var(--color-background-secondary);padding:8px;display:none}
.carrera-group-content.open{display:block}
.diff-card{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);padding:10px 12px;margin-bottom:5px;display:flex;align-items:center;gap:10px;cursor:pointer;transition:background .15s}
.diff-card:hover{background:var(--color-background-secondary)}
.diff-card.sel-diff{border:1.5px solid currentColor}
.diff-card:last-child{margin-bottom:0}
.mode-big{background:var(--color-background-primary);border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:13px 16px;margin-bottom:8px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:background .15s}
.mode-big:hover{background:var(--color-background-secondary)}
/* Save slots */
.save-slot{background:#fff;border:0.5px solid #e0dfd8;border-radius:10px;padding:12px 14px;margin-bottom:8px}
.save-slot.empty{border-style:dashed;background:#fafaf8}
.save-slot-info{flex:1}
.save-slot-name{font-size:14px;font-weight:600;color:#1a1a1a;margin-bottom:2px}
.save-slot-meta{font-size:12px;color:#888}
.save-btns{display:flex;gap:6px;flex-shrink:0;margin-top:8px}
.save-btn{padding:5px 10px;border-radius:6px;border:0.5px solid #ddd;background:#fff;font-size:12px;cursor:pointer;transition:background .15s}
.save-btn:hover{background:#f0ede8}
.save-btn.danger{border-color:#f5b8b8;color:#c0392b}
.save-btn.danger:hover{background:#fef0f0}
.save-btn.primary{border-color:#4a90d9;color:#4a90d9}
.save-btn.primary:hover{background:#f0f6ff}
.import-area{width:100%;min-height:80px;padding:10px;border:0.5px solid #ddd;border-radius:8px;font-size:12px;font-family:monospace;resize:vertical;background:#fafaf8}
.import-area:focus{outline:none;border-color:#999}
/* Dropbag */
.dropbag-item{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;border:0.5px solid var(--color-border-tertiary);border-radius:8px;margin-bottom:6px;cursor:pointer;background:#fff;transition:background .15s}
.dropbag-item:hover{background:var(--color-background-secondary)}
.dropbag-item.sel-bag{border-color:#4a8a2a;background:#f2faf0}
/* ── SPEC RACES DROPDOWN ── */
.spec-toggle{display:flex;align-items:center;gap:8px;padding:8px 10px;cursor:pointer;border-radius:8px;background:var(--color-background-secondary);margin-bottom:6px;font-size:13px;font-weight:600;border:0.5px solid var(--color-border-tertiary)}
.spec-toggle:hover{background:var(--color-background-tertiary)}
.spec-arrow{font-size:12px;transition:transform .2s;flex-shrink:0}
.spec-arrow.open{transform:rotate(90deg)}
.spec-races{display:none;padding-left:8px}
.spec-races.open{display:block}
/* ── CIRCUIT CARD ── */
.circuit-card{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:13px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.circuit-card:hover{background:#f8f7f3}
.circuit-card.joined{border-color:#c07a10;background:#fef9ec}
.circuit-pts{font-size:22px;font-weight:700;color:#c07a10}
/* ── FAME TAB ── */
.fame-action{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:background .15s}
.fame-action:hover:not(.fame-disabled){background:#f8f7f3}
.fame-action.fame-disabled{opacity:0.4;cursor:default}
.fame-stat{background:#f5f4f0;border-radius:8px;padding:10px;text-align:center}
.followers-bar{height:6px;background:#e5e4de;border-radius:3px;overflow:hidden;margin-top:6px}
.followers-fill{height:100%;background:#c07a10;border-radius:3px;transition:width .4s}
.divider{border:none;border-top:1px solid #e8e6e0;margin:16px 0}
.section-label{font-size:13px;color:#888;margin-bottom:8px}
.profile{display:flex;gap:3px;align-items:flex-end;height:40px;margin-bottom:6px}
/* ── CLASIFICACIÓN EN VIVO ── */
.live-class{background:#fff;border:1px solid #e0dfd8;border-radius:10px;padding:10px 14px;margin-bottom:10px}
.live-class-title{font-size:12px;font-weight:700;color:#aaa;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
.live-row{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.live-row.me{font-weight:700;background:#f5f4f0;border-radius:6px;padding:5px 6px;margin:2px -6px}
.live-pos{width:22px;text-align:center;font-size:12px;flex-shrink:0}
.live-name{flex:1}
.live-gap{font-size:12px;color:#aaa;flex-shrink:0}
/* ── FICHA CORREDOR ── */
.runner-header{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.runner-avatar{width:52px;height:52px;border-radius:50%;background:#f0ede8;border:2px solid #e0dfd8;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.rank-badge{display:inline-block;font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;margin-right:6px;margin-top:4px}
.rank-global{background:#f0ede8;color:#666}
.rank-spec{background:#e8eef8;color:#2d4fa0}
.history-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0ede8;font-size:14px}
.history-row:last-child{border-bottom:none}
.contract-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f0ede8;font-size:13px}
.contract-row:last-child{border-bottom:none}

/* ── BARRA FINANCIERA PERSISTENTE ── */
#fin-bar{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid #e8e6e0;padding:8px 0 10px;margin-bottom:16px;display:none}
.fin-inner{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 1fr;gap:0}
.fin-cell{text-align:center;padding:0 4px}
.fin-cell:not(:last-child){border-right:1px solid #eee}
.fin-top{font-size:12px;color:#aaa;margin-bottom:2px}
.fin-val{font-size:14px;font-weight:700}
.fin-val.green{color:#2d7a2d}
.fin-val.red{color:#c0392b}
.fin-val.neutral{color:#1a1a1a}

/* ── TABLA ECONOMÍA ── */
.eco-table{width:100%;border-collapse:collapse;font-size:14px;margin-bottom:14px}
.eco-table td{padding:8px 4px;border-bottom:1px solid #f0ede8}
.eco-table tr:last-child td{border-bottom:none;font-weight:700}
.eco-table .right{text-align:right}
.eco-table .plus{color:#2d7a2d}
.eco-table .minus{color:#c0392b}
.eco-table .total{font-size:15px}
/* ── TRANSICIÓN PANTALLAS ── */
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 150ms ease-out both}
/* ── TOAST FEEDBACK ── */
#toast-notif{position:fixed;top:72px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:7px 18px;border-radius:20px;font-size:13px;font-weight:600;z-index:999;pointer-events:none;white-space:nowrap;transition:opacity .35s;opacity:0}
#toast-notif.show{opacity:1}
/* ── TIP INLINE BUTTON ── */
.tip-btn{display:inline-flex;align-items:center;justify-content:center;width:15px;height:15px;border-radius:50%;border:1px solid #d0cec8;background:#fafaf8;color:#aaa;font-size:10px;cursor:pointer;vertical-align:middle;margin-left:5px;padding:0;line-height:1;flex-shrink:0;font-style:normal;transition:background .15s}
.tip-btn:hover{background:#f0ede8;color:#666;border-color:#bbb}
/* ── TIP OVERLAY (bottom sheet) ── */
#tip-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1200;align-items:flex-end;justify-content:center;padding-bottom:0}
.tip-modal{background:#fff;border-radius:16px 16px 0 0;padding:20px 20px 36px;width:100%;max-width:560px;box-shadow:0 -4px 24px rgba(0,0,0,.12);animation:slideUp 200ms ease-out both}
@keyframes slideUp{from{transform:translateY(60px);opacity:0}to{transform:translateY(0);opacity:1}}
.tip-modal-title{font-size:15px;font-weight:700;margin-bottom:10px}
.tip-modal-body{font-size:13px;color:#555;line-height:1.7}
.tip-modal-close{border:none;background:none;font-size:20px;color:#bbb;cursor:pointer;padding:0;line-height:1;flex-shrink:0}
.tip-modal-close:hover{color:#888}
/* ── UTILITY CLASSES (D1) — patterns repeated 5+ times ── */
.sec-title{font-size:12px;font-weight:700;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.sec-title-sm{font-size:12px;font-weight:600;color:#888;margin-bottom:10px}
.card-title{font-size:14px;font-weight:600}
.card-sub{font-size:12px;color:#888;margin-top:2px}
.flex-between{display:flex;justify-content:space-between;align-items:flex-start}
.flex-between-center{display:flex;justify-content:space-between;align-items:center}
.right-col{text-align:right;flex-shrink:0;margin-left:10px}
.text-warn{font-size:12px;color:#c0392b;margin-top:2px}
.text-ok{font-size:12px;color:#4a8a2a;margin-top:4px}
.text-hint{font-size:12px;color:#aaa}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* ── TUTORIAL OVERLAY (modal centrado) ── */
#tut-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:1300;align-items:center;justify-content:center;padding:20px}
.tut-panel{background:#fff;border-radius:16px;padding:28px 24px 24px;width:100%;max-width:480px;animation:fadeIn 200ms ease-out both}
/* ── COACH MODE ── */
.coach-card{background:#fff;border:1.5px solid #e0dfd8;border-radius:12px;padding:16px;margin-bottom:10px;cursor:pointer;transition:background .15s}
.coach-card:hover{background:#f8f7f3}
.coach-card.sel{border-color:#4a90d9;background:#f0f6ff}
.narrative-item{padding:9px 12px;border-radius:8px;margin-bottom:6px;font-size:13px;border:0.5px solid #e0dfd8;background:#fff;animation:fadeIn 300ms ease-out}
.narrative-item.aid-stop{background:#fef9ec;border-color:#e8c97a}
.personality-badge{display:inline-block;font-size:12px;font-weight:600;padding:2px 8px;border-radius:4px}
</style>
</head>
<body>
<div id="app">
  <div id="toast-notif"></div>

  <!-- Tip overlay (bottom sheet) -->
  <div id="tip-overlay" onclick="if(event.target===this)closeTip()">
    <div class="tip-modal">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px">
        <div class="tip-modal-title" id="tip-title"></div>
        <button class="tip-modal-close" onclick="closeTip()">✕</button>
      </div>
      <div class="tip-modal-body" id="tip-body"></div>
    </div>
  </div>

  <!-- Tutorial overlay (modal centrado) -->
  <div id="tut-overlay" onclick="if(event.target===this)closeTutorial()">
    <div class="tut-panel">
      <div id="tut-content"></div>
    </div>
  </div>
  <div id="fin-bar">
    <div class="fin-inner">
      <div class="fin-cell"><div class="fin-top">Dinero</div><div class="fin-val neutral" id="fb-money">€0</div></div>
      <div class="fin-cell"><div class="fin-top">Neto/mes</div><div class="fin-val" id="fb-net">€0</div></div>
      <div class="fin-cell"><div class="fin-top">Año · Mes</div><div class="fin-val neutral" id="fb-year">1</div></div>
      <div class="fin-cell"><div class="fin-top">Global</div><div class="fin-val neutral" id="fb-rank">—</div></div>
      <div class="fin-cell"><div class="fin-top">Espec.</div><div class="fin-val neutral" id="fb-specrank">—</div></div>
      <div class="fin-cell" style="cursor:pointer" onclick="G.screen='saveScreen';render()" title="Guardar partida">
        <div class="fin-top">Guardar</div>
        <div class="fin-val neutral">💾</div>
      </div>
    </div>
  </div>
  <div id="main"></div>
</div>
<nav id="tab-nav">
  <div class="tab-nav-inner">
    <button class="tab-btn" id="tab-game" onclick="switchTab('game')">
      <span class="tab-icon">🏃</span>
      <span class="tab-label">Temporada</span>
    </button>
    <button class="tab-btn" id="tab-calendar" onclick="switchTab('calendar')">
      <span class="tab-icon">📅</span>
      <span class="tab-label">Calendario</span>
    </button>
    <button class="tab-btn" id="tab-finances" onclick="switchTab('finances')">
      <span class="tab-icon">💰</span>
      <span class="tab-label">Finanzas</span>
    </button>
    <button class="tab-btn" id="tab-runner" onclick="switchTab('runner')">
      <span class="tab-icon">👤</span>
      <span class="tab-label">Corredor</span>
    </button>
    <button class="tab-btn" id="tab-fame" onclick="switchTab('fame')">
      <span class="tab-icon">⭐</span>
      <span class="tab-label">Fama</span>
    </button>
  </div>
</nav>


<script src="js/constants.js?v=57"></script>
<script src="js/state.js?v=57"></script>
<script src="js/save.js?v=57"></script>
<script src="js/race.js?v=57"></script>
<script src="js/coach.js?v=57"></script>
<script src="js/canicross.js?v=57"></script>
<script src="js/render.js?v=57"></script>
<script>
render();
</script>
</body>
</html>
